[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

# ── Servicio Unificado: Bot + API + Scheduler ──────────────────────────
[deploy]
startCommand = "python -m worker.main & python -m scheduler.main & python -m bot.main & uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[variables]
SERVICE_TYPE = "unified"
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
